# AIDEV-NOTE: Deploys the static Spy Chaser game to GitHub Pages.
# The game is a pure static site (index.html + src/*.js ES modules, all relative
# imports, no bundler / no dependencies), so "build" == run the test suite, then
# publish index.html + src/ as the Pages artifact.
# Served at https://linsomniac.github.io/spychaser/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege. The deploy job needs pages + id-token (OIDC) to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      # No dependencies to install. BARE `node --test` from the repo root is the
      # verified-correct invocation (package.json "test" script); `node --test test/`
      # fails to resolve modules on Node 24, so do NOT add a path argument here.
      - run: npm test

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r src _site/
          # Fail fast if the entry point ever moves, so we never deploy a broken site.
          test -f _site/src/main.js
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
