<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Spy Chaser</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0f1a;
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        touch-action: none;
      }
      /* AIDEV-NOTE: The canvas fills the viewport; the engine performs its own
         DPR scaling and 540x720 virtual -> screen letterbox transform in
         engine/canvas.js. Do NOT set a fixed CSS pixel size here. */
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #0b0f1a;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
